name: XSMA-Renew
on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-Game-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/xserver_game_renew.py xserver_game_renew.py

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.XSMA_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          if curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed -E 's/\.[0-9]+\.[0-9]+$/.**.**/' && echo; then
            echo "GOST_OK=true" >> $GITHUB_ENV
          else
            echo "⚠️ GOST 连通性测试失败"
            echo "GOST_OK=false" >> $GITHUB_ENV
          fi

      - name: ⚠️ GOST 失败写回 Cron 1分钟后重试
        if: ${{ env.GOST_OK != 'false' }}
        env:
          CRON_JOB: ${{ secrets.XSMA_CRON }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, datetime
          from datetime import timedelta

          cron_job = os.environ.get("CRON_JOB", "")
          if not cron_job or "," not in cron_job:
              print("⚠️ 未配置 CRON_JOB，跳过")
              exit(0)

          api_key, job_id = [x.strip() for x in cron_job.split(",", 1)]
          next_run = datetime.datetime.now(datetime.timezone.utc).replace(tzinfo=None) + timedelta(hours=8, minutes=1)

          data = {"job": {"schedule": {
              "timezone": "Asia/Shanghai", "expiresAt": 0,
              "hours": [next_run.hour], "minutes": [next_run.minute],
              "mdays": [next_run.day], "months": [next_run.month], "wdays": [-1],
          }}}
          payload = json.dumps(data).encode()
          req = urllib.request.Request(
              f"https://api.cron-job.org/jobs/{job_id}",
              data=payload,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
              method="PATCH"
          )
          urllib.request.urlopen(req, timeout=15)
          print(f"🔁 GOST失败，已写回Cron：{next_run.month:02d}月{next_run.day:02d}日 {next_run.hour:02d}:{next_run.minute:02d} 重试")

          tg_bot = os.environ.get("TG_BOT", "")
          if tg_bot and "," in tg_bot:
              import urllib.parse
              chat_id, token = [x.strip() for x in tg_bot.split(",", 1)]
              msg = f"⚠️ GOST代理启动失败，已安排1分钟后重试"
              urllib.request.urlopen(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode(),
                  timeout=10
              )
              print("📨 TG 推送成功")
          EOF

      - name: 🔧 执行续期
        if: ${{ env.GOST_OK != 'false' }}
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSMA_ACCOUNT }}
          GOST_PROXY: ${{ secrets.XSMA_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.XSMA_CRON }}
        run: python3 xserver_game_renew.py
      
      - name: 🔧 执行续期
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSMA_ACCOUNT }}
          GOST_PROXY: ${{ secrets.XSMA_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.XSMA_CRON }}
        run: python3 xserver_game_renew.py

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f "gost -L" || true
          pkill -f python || true
          rm -f gost gost_*.tar.gz gost.log xserver_game_renew.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
