name: XSMB-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
    
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 拉取本仓库（用于读写 workflow yml）
        uses: actions/checkout@v4
        with:
          path: main
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-Game-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 复制脚本到工作目录
        run: cp private/xserver_game_renew.py main/xserver_game_renew.py
        
      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet
        
      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed -E 's/\.[0-9]+\.[0-9]+$/.**.**/' && echo
      
      - name: 🔧 执行续期
        working-directory: main
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSMB_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          YML_TARGET_FILE: .github/workflows/xsmb_renew.yml
        run: python3 xserver_game_renew.py
        
      - name: 📤 提交更新后的 cron
        working-directory: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/xsmb_renew.yml
          git diff --staged --quiet || git commit -m "chore: auto update cron schedule"
          git push
